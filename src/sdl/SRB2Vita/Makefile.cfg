#
# Makefile.cfg for SRB2Vita native using libnx
#

SRB2NAME?=srb2kart
EXENAME?=$(SRB2NAME).elf
DBGNAME?=$(SRB2NAME).elf.debug
EBOOTNAME?=eboot.bin
ICONJPG?=sdl/SRB2Vita/icon.jpg
APPDIR=ux0:data/$(SRB2NAME)
ZIPNAME=$(SRB2NAME).vpk

ZIP=zip -r -9

# Disable same warning flags
WFLAGS+=-w

VITASDK:=C:/Users/Julien/PSVITA/vitasdk/arm-vita-eabi

# BRANCHE vitagl-modern : on NE TOUCHE PAS au vitaGL installe dans le SDK — c'est
# celui de 2019, dont depend la branche master, qui elle FONCTIONNE. On pointe ici
# vers notre propre copie du vitaGL actuel : les deux versions coexistent, et on
# peut revenir a la version stable a tout moment.
VITAGL_DIR?=C:/Users/Julien/PSVITA/tools/vitaGL-master

# vitaShaRK (le compilateur de shaders que le vitaGL moderne utilise, meme pour le
# pipeline fixe) exige SceShaccCgExt — une bibliotheque tierce que le VitaSDK ne
# fournit pas (https://github.com/bythos14/SceShaccCgExt).
SHACCEXT_DIR?=C:/Users/Julien/PSVITA/tools/SceShaccCgExt/build

INCLUDE:=-I$(VITASDK)/include/SDL2 -I$(VITAGL_DIR)/source

# NOTE : -lvitaGL retiré tant qu'on compile en NOHW=1 (rendu logiciel) ;
# le remettre (et l'installer) pour la phase renderer OpenGL
LIBS += -L$(VITAGL_DIR) -L$(SHACCEXT_DIR) -lSDL2 -lSDL2_mixer -lvorbisfile -lvorbis -logg -lsndfile -lmodplug -lFLAC -lxmp -lSceAudioIn_stub -lvitaGL -lmathneon -lvita2d -lSceLibKernel_stub -lScePvf_stub \
	-lSceJpegEnc_stub -lSceAppMgr_stub -lSceCtrl_stub -lSceTouch_stub -lSceMotion_stub \
	-lScePromoterUtil_stub -lm -lSceNet_stub -lSceNetCtl_stub -lSceAppUtil_stub -lScePgf_stub \
	-ljpeg -lfreetype -lc -lScePower_stub -lSceCommonDialog_stub -lpng16 -lz -lSceCamera_stub \
	-lspeexdsp -lmpg123 -lSceAudio_stub -lSceGxm_stub -lSceDisplay_stub -lSceShellSvc_stub -lm \
	-lopusfile -lopus -lSceHttp_stub -lSceSysmodule_stub -lpng -lz -ljpeg -lSceHid_stub \
	-lSceIme_stub \
	-lvitashark -lSceShaccCgExt -lSceShaccCg_stub -lSceKernelDmacMgr_stub -ltaihen_stub

# Master server + telechargement des addons : libcurl adossee a **mbedTLS**
# (paquet vdpm « curl-mbedtls »), et SURTOUT PAS a OpenSSL.
#
# RAISON : LICENCE. SRB2Kart est sous GPLv2 et la licence d'OpenSSL lui est
# INCOMPATIBLE : un eboot GPLv2 liant OpenSSL en statique n'est pas distribuable.
# mbedTLS est en DOUBLE LICENCE Apache-2.0 **ou GPL-2.0-or-later** : en retenant
# l'option GPL, tout est compatible, et on ne depend de personne.
#
# (On a d'abord essaye la pile TLS du SYSTEME, SceHttp/SceSsl — juridiquement ideal
#  via l'exception « bibliotheque systeme ». Mesure : la poignee de main echoue AVANT
#  meme la verification du certificat. Le firmware est trop ancien pour
#  ms.kartkrew.org, qui exige TLS 1.2. C'est la raison d'etre d'iTLS-Enso — qu'on ne
#  veut pas imposer aux joueurs.)
#
# On NE PASSE PAS par curl-config (ses chemins sont ceux de la machine de build
# d'origine). En lien statique, ce dont curl depend doit venir APRES lui.
CURL_CFLAGS := -DCURL_STATICLIB
CURL_LDFLAGS := -lcurl -lmbedtls -lmbedx509 -lmbedcrypto -lzstd -lz -lpthread \
	-lSceRtc_stub -lSceSysmem_stub -lSceKernelThreadMgr_stub \
	-lSceKernelModulemgr_stub -lSceIofilemgr_stub -lSceProcessmgr_stub \
	-lSceLibKernel_stub -lSceNet_stub -lSceNetCtl_stub -lSceSysmodule_stub -lc

# CRUCIAL : les syscalls fichiers de newlib (lib_a-syscalls.o) importent
# sceIoOpen/Lseek/Getstat... fournis par SceIofilemgr. Sans cette lib — et
# placée APRES -lc, sinon le linker ne peut pas y resoudre les symboles de la
# libc — ils se resolvent en stubs faibles : fopen/fread/fwrite "reussissent"
# sans rien faire. C'est ce qui rendait tous les WADs illisibles.
LIBS += -lSceIofilemgr_stub -lSceLibKernel_stub

CFILES   := $(foreach dir,$(SOURCES), $(wildcard $(dir)/*.c))
CPPFILES   := $(foreach dir,$(SOURCES), $(wildcard $(dir)/*.cpp))
BINFILES := $(foreach dir,$(DATA), $(wildcard $(dir)/*.bin))
OBJS     := $(addsuffix .o,$(BINFILES)) $(CFILES:.c=.o) $(CPPFILES:.cpp=.o) 

PREFIX  = arm-vita-eabi
PREFIX:=$(VITASDK)/../bin/$(PREFIX)
CC      = $(PREFIX)-gcc
OBJCOPY = $(PREFIX)-objcopy
CXX      = $(PREFIX)-g++
CFLAGS  = -g -fsigned-char -std=gnu11 $(INCLUDE) -D__vita__ $(WFLAGS) -DNOLOADSO \
	-DNOOBJDUMP -Wl,-q -Wl,--allow-multiple-definition -DHAVE_MIXER -DHAVE_SDL -DSTATIC_OPENGL -DMINI_GL_COMPATIBILITY -DSDL_opengl_h_ -D__glext_h_ -D__gl_glext_h_ -D__gl_h_ -DSTATIC_OPENGL -DMINI_GL_COMPATIBILITY -DSDL_opengl_h_ -D__glext_h_ -D__gl_glext_h_ -D__gl_h_

# Rendu logiciel 480x272 upscalé x2 par le GPU (cohérent avec NOHW=1)
ifdef NOHW
CFLAGS += -DFORCE_SW_RENDERER
endif
CXXFLAGS  = -Wl,-Map=$(BIN)/link.map $(CFLAGS) -fno-exceptions -std=gnu++11 -fpermissive
ASFLAGS = $(CFLAGS)

$(BIN)/$(EBOOTNAME): $(BIN)/$(EXENAME)
	cp $< $<.unstripped.elf
	$(PREFIX)-strip -g $<
	vita-elf-create $< $@
	vita-make-fself -s $@ sdl/SRB2Vita/build/eboot.bin
	# ATTRIBUTE2=12 : mode memoire etendue (+109 Mo) — requis par le tas de
	# 256 Mo (voir d_main.c) ; penser a pousser ce param.sfo sur la console
	vita-mksfoex -d ATTRIBUTE2=12 -s TITLE_ID=SRB2KART0 "SRB2Kart" sdl/SRB2Vita/build/sce_sys/param.sfo
	# (empaquetage .vpk fait a part, pas de 7z sur cette machine)






